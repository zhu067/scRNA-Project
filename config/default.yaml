# GSE146912 主流程默认配置。复制为 config/local.yaml 覆盖单项，并用
#   python scripts/run_pipeline.py --config config/local.yaml

project:
  random_seed: 0
  # 仓库根目录：默认取当前工作目录；也可用环境变量 SCRNA_PROJECT_ROOT
  root: null

paths:
  # 相对 project.root；合并矩阵 h5ad
  raw_h5ad: results/GSE146912_Merged_Raw.h5ad
  output_run_dir: results/GSE146912_run
  figures_subdir: figures
  tables_subdir: tables
  provenance_subdir: provenance

provenance:
  # 对输入 h5ad 做整文件 SHA256（大文件会稍慢）
  hash_input_full_file: false
  # 记录每一步到 run_manifest.json
  write_manifest: true

normalization:
  # X 最大值低于该阈值时视为已 log/归一化，跳过 normalize_total+log1p
  xmax_skip_normalize: 100.0
  target_sum: 10000
  xmax_sample_step: 8000

processing:
  batch_key: batch
  hvg_n_top_genes: 3000
  hvg_flavor: seurat
  hvg_subset: true
  scale_max_value: 10
  scale_zero_center: false
  pca_solver: arpack
  n_neighbors: 15
  n_pcs_neighbors: 40
  umap: true

leiden:
  resolution: 0.5
  key_added: leiden
  flavor: igraph
  n_iterations: 2

annotation:
  # 打分列与主笔记本一致；可改基因列表
  score_margin_lowconf: 0.03
  marker_sets:
    POD: [Nphs1, Nphs2, Thsd7a, Pdpn, Wt1, Mafb]
    PEC: [Cldn1, Dkk3, Akap12, Pax8, Pax2, Krt8, Krt18]
    TEC: [Fxyd2, Umod, Aqp2, Aqp3, Slc12a1, Slc12a3]
    END: [Flt1, Tie1, Pecam1, Kdr]
    MES: [Gata3, Pdgfrb, Des, Itga8]
    SMC: [Acta2, Ren1, Myh11, Tagln]
    IMM: [Cd68, Cd14, Ptprc, Cd3d]
  mygene_species: mouse

qc:
  # 线粒体比例：需 Biomart（pybiomart）；失败时仅记录警告
  mito_biomart_org: mmusculus
  mito_attrname: ensembl_gene_id
  annotate_mito: true
  # 以下为过滤；null 表示不启用该阈值
  filter_min_genes: null
  filter_max_genes: null
  filter_min_counts: null
  filter_max_mito_pct: null
  scrublet:
    enabled: false
    expected_doublet_rate: 0.06
    # 已明显 log 归一化数据上结果不可靠，仅作记录
    note: "Prefer raw counts for Scrublet; if xmax_skip_normalize triggered, scrublet may be skipped."

batch_balance:
  # 记录每 batch 细胞数；若某 batch 占比低于该比例则 warn（不中断）
  min_fraction_warn: 0.02

pec_subcluster:
  enabled: true
  hvg_n_top_genes: 2500
  n_neighbors: 15
  n_pcs_max: 40
  leiden_resolutions:
    r04: 0.4
    r08: 0.8
  default_cluster_key: leiden_pec_r08
  scale_max_value: 10

injury_comm:
  enabled: false
  # 与主流程共用 analyzed h5ad；在 run_pipeline --stages injury_comm 时运行
  # 论文（Kidney International 2023, GSE146912）：细胞通讯以 CellChat 为主，见 scripts/cellchat_GSE146912_PEC.R
  control_token: control
  nephritis_token: nephritis
  liana:
    # 默认关闭：LIANA 与论文方法不等价，仅作多数据库共识的探索性补充
    enabled: false
    resource_name: mouseconsensus
    expr_prop: 0.1
  # 以下仅用于笔记本中可选 DoRothEA 探索，非论文 SCENIC 流程
  dorothea_levels: [A, B]

# 事件流最小原型（Python）：以 R CellChat 差异权重为边，可后续替换为 FlowSig
event_flow:
  enabled: false
  cellchat_diff_dir: tables/PEC_injury_comm/cellchat_R_diff/diff
  weight_matrix_csv: cellchat_diff_weight_matrix.csv
  top_k_paths: 15
  max_path_length: 4
  # 路径打分仅考虑 nephritis−control 为正的边（上调通讯）；≤0 的边不参与路径扩展
  path_use_positive_delta_only: true
  # 可选：节点活性 CSV（列如 cell_type_major, deg_direction: up|down|neutral），不存在则跳过
  pec_node_activity_csv: null

# FlowSig 最小接入：将 CellChat 差异矩阵装配为 FlowSig 网络并导出节点/边/路径
flowsig:
  enabled: false
  # 相对 tables_dir（默认 results/GSE146912_run/tables）
  cellchat_diff_dir: PEC_injury_comm/cellchat_R_diff/diff
  weight_matrix_csv: cellchat_diff_weight_matrix.csv
  positive_delta_only: true
  top_k_paths: 15
  max_path_length: 4

outputs:
  analyzed_h5ad: GSE146912_merged_analyzed.h5ad
  pec_h5ad: GSE146912_PEC_reclustered.h5ad
  cellchat_export_h5ad: GSE146912_for_CellChat_symbol_injury.h5ad
