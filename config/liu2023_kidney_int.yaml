# Liu WB 等 Kidney International 2023（GSE146912）— 论文级复现推荐覆盖层
#
# 用法（在仓库根目录）：
#   python scripts/run_pipeline.py --config config/default.yaml --local-config config/liu2023_kidney_int.yaml --stages main pec_subcluster
#
# QC / HVG / Leiden 等数值必须以原文 PDF 与 Supplementary 为准，在 config/local.yaml 中
# 对 qc.filter_*、processing.hvg_n_top_genes、leiden.resolution 等进行覆盖并保留 provenance。
#
# 说明：本文件不替代阅读原文。

project:
  random_seed: 0

provenance:
  hash_input_full_file: true

normalization:
  target_sum: 10000

processing:
  hvg_flavor: seurat

leiden:
  resolution: 0.5

injury_comm:
  liana:
    enabled: false
